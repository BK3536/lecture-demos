# labs.remilab.ai — Static HTML lecture demos
# Deploy alongside obsidian-stack on remilab-r02
#
# Usage:
#   # Standalone:
#   docker compose -f docker-compose.labs.yml up -d
#
#   # Or merge into obsidian-stack:
#   cp docker-compose.labs.yml /path/to/obsidian-stack/
#   docker compose -f docker-compose.yml -f docker-compose.labs.yml up -d

services:
  labs-static:
    image: nginx:1.27-alpine
    container_name: remilab-labs
    restart: unless-stopped
    volumes:
      - ${LABS_CONTENT_PATH:-/mnt/nfs_share/personal-workspaces/byungkwan-workspace/teaching/lecture/demos}:/usr/share/nginx/html:ro
      - ./nginx-labs.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - 127.0.0.1:${LABS_PORT:-8092}:80
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ | grep -q '<html'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s
