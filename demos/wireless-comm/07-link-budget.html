<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="../theme.css?v=3">
<title>Link Budget Calculator</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="../theme.js?v=3"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Pretendard', 'Inter', system-ui, -apple-system, sans-serif; background: #111827; color: #d1d5db; }
  .header { padding: 1.2rem 2rem; background: #1f2937; border-bottom: 1px solid #374151; }
  .header h1 { font-size: 1.4rem; font-weight: 600; }
  .header p { font-size: 0.85rem; color: #9ca3af; margin-top: 0.3rem; }
  .container { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 80px); }
  .controls { padding: 1.2rem; background: #1f2937; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
  .control-group { background: #111827; border-radius: 8px; padding: 1rem; }
  .control-group h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; margin-bottom: 0.7rem; }
  label { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; margin-bottom: 0.3rem; }
  label span.val { color: #60a5fa; font-family: monospace; }
  input[type=range] { width: 100%; accent-color: #60a5fa; margin-bottom: 0.5rem; }
  select { width: 100%; padding: 0.4rem; background: #1f2937; color: #d1d5db; border: 1px solid #374151; border-radius: 6px; font-size: 0.85rem; margin-bottom: 0.5rem; }
  .plots { padding: 1rem; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 0.5rem; }
  .plot { background: #1f2937; border-radius: 8px; }
  .info-box { background: #111827; border-radius: 8px; padding: 0.8rem 1rem; font-size: 0.8rem; line-height: 1.6; color: #9ca3af; }
  .info-box code { color: #60a5fa; }
  .metric { display: flex; justify-content: space-between; padding: 0.3rem 0; border-bottom: 1px solid #1f2937; font-size: 0.82rem; }
  .metric:last-child { border-bottom: none; }
  .metric .label { color: #9ca3af; }
  .metric .value { color: #60a5fa; font-family: monospace; font-weight: 600; }
  .metric .value.good { color: #4ade80; }
  .metric .value.bad { color: #ef4444; }
</style>
</head>
<body>
<div class="header">
  <a class="back-link" href="../index.html" title="All demos">&larr;</a>
  <div class="header-title">
    <h1>Link Budget Calculator</h1>
    <p>Rappaport — Free-Space Path Loss and Link Budget Analysis</p>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme"></button>
</div>
<div class="container">
  <div class="controls">
    <div class="control-group">
      <h3>Transmitter</h3>
      <label>Tx Power P<sub>t</sub> (dBm) <span class="val" id="v-pt">30</span></label>
      <input type="range" id="pt" min="0" max="50" step="1" value="30">
      <label>Tx Antenna Gain G<sub>t</sub> (dBi) <span class="val" id="v-gt">10</span></label>
      <input type="range" id="gt" min="0" max="30" step="1" value="10">
    </div>
    <div class="control-group">
      <h3>Channel</h3>
      <label>Frequency (GHz) <span class="val" id="v-freq">2.4</span></label>
      <input type="range" id="freq" min="0.1" max="80" step="0.1" value="2.4">
      <label>Distance (km) <span class="val" id="v-dist">1.0</span></label>
      <input type="range" id="dist" min="0.01" max="50" step="0.01" value="1">
      <label>Path Loss Exponent n <span class="val" id="v-ple">2.0</span></label>
      <input type="range" id="ple" min="1.5" max="5" step="0.1" value="2">
      <label>Extra Loss (dB) <span class="val" id="v-extra">0</span></label>
      <input type="range" id="extra" min="0" max="30" step="1" value="0">
    </div>
    <div class="control-group">
      <h3>Receiver</h3>
      <label>Rx Antenna Gain G<sub>r</sub> (dBi) <span class="val" id="v-gr">3</span></label>
      <input type="range" id="gr" min="0" max="30" step="1" value="3">
      <label>Noise Figure NF (dB) <span class="val" id="v-nf">6</span></label>
      <input type="range" id="nf" min="1" max="15" step="0.5" value="6">
      <label>Bandwidth (MHz) <span class="val" id="v-bw">20</span></label>
      <input type="range" id="bw" min="0.1" max="100" step="0.1" value="20">
      <label>Required SNR (dB) <span class="val" id="v-reqsnr">10</span></label>
      <input type="range" id="reqsnr" min="0" max="30" step="1" value="10">
    </div>
    <div class="control-group">
      <h3>Link Budget Summary</h3>
      <div class="metric"><span class="label">EIRP</span><span class="value" id="m-eirp">—</span></div>
      <div class="metric"><span class="label">Path Loss</span><span class="value" id="m-pl">—</span></div>
      <div class="metric"><span class="label">Rx Power</span><span class="value" id="m-prx">—</span></div>
      <div class="metric"><span class="label">Noise Floor</span><span class="value" id="m-nf">—</span></div>
      <div class="metric"><span class="label">SNR</span><span class="value" id="m-snr">—</span></div>
      <div class="metric"><span class="label">Link Margin</span><span class="value" id="m-margin">—</span></div>
    </div>
  </div>
  <div class="plots">
    <div class="plot" id="plot-waterfall"></div>
    <div class="plot" id="plot-range"></div>
    <div class="plot" id="plot-freq"></div>
    <div class="plot" id="plot-compare"></div>
  </div>
</div>
<script>
var _t=THEMES[curTheme];var plotBg=_t.plotBg,paperBg=_t.paperBg,gridColor=_t.gridColor,textColor=_t.textColor;
var lo={paper_bgcolor:paperBg,plot_bgcolor:plotBg,font:{color:textColor,size:11},margin:{t:40,r:16,b:40,l:55},xaxis:{gridcolor:gridColor,zerolinecolor:_t.zeroLine},yaxis:{gridcolor:gridColor,zerolinecolor:_t.zeroLine}};

// FSPL in dB: 20log10(4*pi*d*f/c)
function fspl(d_m, f_hz, n) {
  if(d_m <= 0) return 0;
  const d0 = 1; // reference distance 1m
  const pl0 = 20*Math.log10(4*Math.PI*d0*f_hz/3e8);
  return pl0 + 10*n*Math.log10(d_m/d0);
}

function update() {
  const pt=+document.getElementById('pt').value;
  const gt=+document.getElementById('gt').value;
  const freq=+document.getElementById('freq').value;
  const dist=+document.getElementById('dist').value;
  const ple=+document.getElementById('ple').value;
  const extra=+document.getElementById('extra').value;
  const gr=+document.getElementById('gr').value;
  const nf=+document.getElementById('nf').value;
  const bw=+document.getElementById('bw').value;
  const reqSnr=+document.getElementById('reqsnr').value;

  document.getElementById('v-pt').textContent=pt;
  document.getElementById('v-gt').textContent=gt;
  document.getElementById('v-freq').textContent=freq;
  document.getElementById('v-dist').textContent=dist;
  document.getElementById('v-ple').textContent=ple.toFixed(1);
  document.getElementById('v-extra').textContent=extra;
  document.getElementById('v-gr').textContent=gr;
  document.getElementById('v-nf').textContent=nf;
  document.getElementById('v-bw').textContent=bw;
  document.getElementById('v-reqsnr').textContent=reqSnr;

  const f_hz = freq * 1e9;
  const d_m = dist * 1000;
  const bw_hz = bw * 1e6;

  const eirp = pt + gt;
  const pl = fspl(d_m, f_hz, ple) + extra;
  const prx = eirp - pl + gr;
  const thermalNoise = -174 + 10*Math.log10(bw_hz); // dBm/Hz * BW
  const noiseFloor = thermalNoise + nf;
  const snr = prx - noiseFloor;
  const margin = snr - reqSnr;

  document.getElementById('m-eirp').textContent = eirp.toFixed(1)+' dBm';
  document.getElementById('m-pl').textContent = pl.toFixed(1)+' dB';
  document.getElementById('m-prx').textContent = prx.toFixed(1)+' dBm';
  document.getElementById('m-nf').textContent = noiseFloor.toFixed(1)+' dBm';
  document.getElementById('m-snr').textContent = snr.toFixed(1)+' dB';
  const marginEl = document.getElementById('m-margin');
  marginEl.textContent = margin.toFixed(1)+' dB';
  marginEl.className = 'value '+(margin>=0?'good':'bad');

  // Plot 1: Waterfall diagram
  const stages = ['Pt','Gt','EIRP','-PL','+Gr','-Extra','Prx','NF','SNR','Req','Margin'];
  const values = [pt, gt, 0, -fspl(d_m,f_hz,ple), gr, -extra, 0, 0, 0, 0, 0];
  // Build cumulative waterfall
  const cumulative = [pt, pt+gt, pt+gt, pt+gt-fspl(d_m,f_hz,ple), pt+gt-fspl(d_m,f_hz,ple)+gr, prx, prx, noiseFloor, snr, reqSnr, margin];
  const wfColors = cumulative.map((v,i)=> i===cumulative.length-1?(margin>=0?'#4ade80':'#ef4444'): (i<=2?'#60a5fa':i<=5?'#facc15':'#a78bfa'));

  const wfLabels = ['P_t','G_t','EIRP','-FSPL','+G_r','-L_extra','P_rx','N_floor','SNR','SNR_req','Margin'];
  Plotly.react('plot-waterfall',[{
    x: wfLabels, y: cumulative, type: 'bar',
    marker: {color: wfColors},
    text: cumulative.map(v=>v.toFixed(1)),
    textposition: 'outside',
    textfont: {color: textColor, size: 10}
  }],{...lo,title:{text:'Link Budget Waterfall (dB/dBm)',font:{size:13}},xaxis:{...lo.xaxis},yaxis:{...lo.yaxis,title:'dBm / dB'}},{responsive:true});

  // Plot 2: SNR vs Distance
  const dists = Array.from({length:200},(_,i)=>0.01+i*0.5); // 0.01 to 100 km
  const snrVsDist = dists.map(d => {
    const p = fspl(d*1000, f_hz, ple) + extra;
    return eirp - p + gr - noiseFloor;
  });
  Plotly.react('plot-range',[
    {x:dists,y:snrVsDist,mode:'lines',line:{color:'#60a5fa',width:2.5},name:'SNR'},
    {x:[dists[0],dists[dists.length-1]],y:[reqSnr,reqSnr],mode:'lines',line:{color:'#ef4444',width:1.5,dash:'dash'},name:`Required SNR (${reqSnr} dB)`},
    {x:[dist],y:[snr],mode:'markers',marker:{size:12,color:'#facc15',symbol:'star'},name:'Current'},
  ],{...lo,title:{text:'SNR vs Distance',font:{size:13}},xaxis:{...lo.xaxis,title:'Distance (km)',type:'log'},yaxis:{...lo.yaxis,title:'SNR (dB)'},legend:{x:0.55,y:1}},{responsive:true});

  // Plot 3: Path Loss vs Frequency (at current distance)
  const freqRange = Array.from({length:200},(_,i)=>0.1+i*0.5); // 0.1 to 100 GHz
  const plVsFreq = freqRange.map(f => fspl(d_m, f*1e9, ple));
  Plotly.react('plot-freq',[
    {x:freqRange,y:plVsFreq,mode:'lines',line:{color:'#f472b6',width:2.5},name:'FSPL'},
    {x:[freq],y:[fspl(d_m,f_hz,ple)],mode:'markers',marker:{size:12,color:'#facc15',symbol:'star'},name:'Current'},
  ],{...lo,title:{text:`Path Loss vs Frequency (d=${dist} km, n=${ple.toFixed(1)})`,font:{size:13}},xaxis:{...lo.xaxis,title:'Frequency (GHz)',type:'log'},yaxis:{...lo.yaxis,title:'Path Loss (dB)'},legend:{x:0.05,y:1}},{responsive:true});

  // Plot 4: Compare common systems
  const systems = [
    {name:'WiFi 2.4G', f:2.4, pt:20, gt:3, gr:3, bw:20, nf:6, n:2, color:'#60a5fa'},
    {name:'WiFi 5G', f:5.8, pt:20, gt:5, gr:3, bw:40, nf:6, n:2, color:'#4ade80'},
    {name:'5G mmWave', f:28, pt:30, gt:20, gr:10, bw:100, nf:7, n:2, color:'#facc15'},
    {name:'LTE', f:1.8, pt:43, gt:15, gr:0, bw:10, nf:3, n:2, color:'#f472b6'},
    {name:'Satellite', f:12, pt:40, gt:35, gr:20, bw:36, nf:1.5, n:2, color:'#34d399'},
    {name:'Current', f:freq, pt:pt, gt:gt, gr:gr, bw:bw, nf:nf, n:ple, color:'#a78bfa'},
  ];
  const sysTraces = systems.map(sys => {
    const snrs = dists.map(d => {
      const p = fspl(d*1000, sys.f*1e9, sys.n) ;
      const nFloor = -174 + 10*Math.log10(sys.bw*1e6) + sys.nf;
      return sys.pt + sys.gt - p + sys.gr - nFloor;
    });
    return {x:dists,y:snrs,mode:'lines',line:{color:sys.color,width:sys.name==='Current'?3:1.5,dash:sys.name==='Current'?'solid':'dot'},name:sys.name};
  });
  sysTraces.push({x:[dists[0],dists[dists.length-1]],y:[reqSnr,reqSnr],mode:'lines',line:{color:'#ef4444',width:1,dash:'dash'},name:'Threshold'});

  Plotly.react('plot-compare',sysTraces,{...lo,title:{text:'System Comparison: SNR vs Distance',font:{size:13}},xaxis:{...lo.xaxis,title:'Distance (km)',type:'log'},yaxis:{...lo.yaxis,title:'SNR (dB)',range:[-20,80]},legend:{font:{size:9}}},{responsive:true});
}

['freq'].forEach(id=>document.getElementById(id).addEventListener('change',update));
['pt','gt','freq','dist','ple','extra','gr','nf','bw','reqsnr'].forEach(id=>document.getElementById(id).addEventListener('input',update));
update();
</script>
</body>
</html>
